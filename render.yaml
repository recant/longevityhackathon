# Private shareable demo — Render Blueprint (free tier).
# Docs: DEPLOY.md
# Note: Free tier has ephemeral storage; SQLite resets on redeploy. Upgrade to a paid
# instance and add a persistent disk in the dashboard if you need data to persist.
services:
  - type: web
    name: longevitree-demo
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SHARE_USER
        sync: false
      - key: SHARE_PASSWORD
        sync: false
